{{- range $msvc, $v := .Values.microservices }}
{{- with $ -}}

{{- if not (empty $v) }} # Check if the microservice values are not empty
{{- if $v.job.enabled }} # Check if the job is enabled for the microservice
{{- $image := printf "%s:%s" $v.image.repository $v.image.tag }}
{{- if $v.image.name }}
  {{ $image = printf "%s/%s/%s:%s" .Values.global.image.defaultImageRegistry .Values.global.image.defaultImageRepository $v.image.name $v.image.tag }}
{{- else }}
  {{ $image = printf "%s/%s/%s:%s" .Values.global.image.defaultImageRegistry .Values.global.image.defaultImageRepository $msvc $v.image.tag }}
  {{ if $v.image.repository }}
  {{ $image = printf "%s:%s" $v.image.repository $v.image.tag }}
  {{ end }} # End of the check if image.repository is set
{{ end }} # End of the check if image.name is set

{{- $backoffLimit := $v.job.backoffLimit | default 6 }}
{{- $completions := $v.job.completions | default 1 }}
{{- $parallelism := $v.job.parallelism | default 1 }}
{{- $restartPolicy := $v.job.restartPolicy | default "Never" }}
{{- $imagePullPolicy := $v.image.pullPolicy | default .Values.defaults.image.pullPolicy }}
{{- $suspended := $v.job.suspended | default false }}  # Suspended job logic
{{- $envs := $v.envs }}
{{- $extraEnvs := $v.extraEnvs | default .Values.defaults.extraEnvs }}
{{- $labels := $v.labels }}
{{- $securityContext := $v.securityContext | default (dict "capabilities" (dict "drop" (list "ALL"))) }}  # Default drop all capabilities
{{- $namespace := $v.namespace | default .Release.Namespace }}
{{- $command := $v.command | default .Values.defaults.command }}
{{- $args := $v.args | default .Values.defaults.args }}

{{- if not $suspended }}  # Do not create Job if suspended is true
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $msvc }}
  namespace: {{ $namespace }}
  labels:
    app: {{ $msvc }}
    {{- include "universal-app-chart.labels" . | nindent 4 }}
    {{- if $labels -}} {{- toYaml $labels | nindent 4 }} {{- end }}
spec:
  completions: {{ $completions }}
  parallelism: {{ $parallelism }}
  backoffLimit: {{ $backoffLimit }}
  template:
    spec:
      restartPolicy: {{ $restartPolicy }}
      containers:
        - name: {{ $msvc }}
          image: {{ $image }}
          imagePullPolicy: {{ $imagePullPolicy }}
          {{- with $securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: "POD_NAME"
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: "POD_NAMESPACE"
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: "NAMESPACE"
              valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
            {{- range $key, $value := $envs }}
            - name: {{ $key }}
              value: {{ $value | toString | quote }}
            {{- end }}
            {{- range $extraEnvs }}
            - name: {{ .name | quote }}
              {{- if .value }}
              value: {{ with .value }}{{ tpl . $ | quote }}{{- end }}
              {{- end -}}
              {{- if .valueFrom }}
              valueFrom:
              {{- .valueFrom | toYaml | nindent 14 }}
              {{- end -}}
            {{- end }}
          {{- if $command }}
          command:
            {{- toYaml $command | nindent 12 }}
          {{- end }}
          {{- if $args }}
          args:
            {{- toYaml $args | nindent 12 }}
          {{- end }}

{{- end }}  # End suspended check
{{- end }}  # End of job enabled check
{{- end }}  # End of check if microservice values are not empty
{{- end }}  # End of the "with" block
{{- end }}