# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
---
suite: initContainer image spec
tests:
  - it: should construct initContainer image from structured image.name + image.tag using global defaults
    set:
      microservices.frontend.enabled: true
      microservices.frontend.image.name: frontend
      microservices.frontend.image.tag: v1.0.0
      microservices.frontend.initContainers:
        - name: my-init
          image:
            name: my-init-image
            tag: "1.0.0"
          command: ["echo", "hello"]
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: my-init
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: registry.gamewarden.io/testapp/my-init-image:1.0.0
    template: templates/deployment.yaml

  - it: should fallback to container name when image.name is not provided
    set:
      microservices.frontend.enabled: true
      microservices.frontend.image.name: frontend
      microservices.frontend.image.tag: v1.0.0
      microservices.frontend.initContainers:
        - name: my-init
          image:
            tag: "1.0.0"
          command: ["echo", "hello"]
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: registry.gamewarden.io/testapp/my-init:1.0.0
    template: templates/deployment.yaml

  - it: should render command, args, env, resources, and volumeMounts
    set:
      microservices.frontend.enabled: true
      microservices.frontend.image.name: frontend
      microservices.frontend.image.tag: v1.0.0
      microservices.frontend.initContainers:
        - name: my-init
          image:
            name: my-init-image
            tag: "1.0.0"
          command: ["sh", "-c"]
          args: ["echo hello"]
          env:
            - name: FOO
              value: bar
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].command
          value: ["sh", "-c"]
      - equal:
          path: spec.template.spec.initContainers[0].args
          value: ["echo hello"]
      - equal:
          path: spec.template.spec.initContainers[0].env[0].name
          value: FOO
      - equal:
          path: spec.template.spec.initContainers[0].resources.requests.cpu
          value: 100m
    template: templates/deployment.yaml
