# Test values file for validating helm chart works with subCharts only (without microservices)
# This file can be used with: helm template test-release . -f tests/test-values-subcharts-only.yaml
#
# This validates that infrastructure resources can be created without requiring microservices
# For v2.0.0: Uses Helm chart dependencies instead of ArgoCD Applications
#
# To use this file with actual subcharts:
# 1. Add dependencies to Chart.yaml (see example below)
# 2. Run: helm dependency update
# 3. Test: helm template test-release . -f tests/test-values-subcharts-only.yaml
#
# Example Chart.yaml dependencies:
# dependencies:
#   - name: redis
#     version: "17.9.5"
#     repository: "https://charts.bitnami.com/bitnami"
#     condition: subCharts.redis.enabled
#   - name: postgresql
#     version: "12.0.0"
#     repository: "https://charts.bitnami.com/bitnami"
#     condition: subCharts.postgresql.enabled

global:
  domain: test.example.com
  customerName: test-customer
  applicationName: test-app
  environment: test
  impactLevel: il2
  gateway: istio-system/main-gateway
  image:
    defaultImageRegistry: registry.example.com
    defaultImageRepository: test-customer
  istio:
    mtls:
      enabled: true

# No microservices defined - testing infrastructure-only deployment
microservices: {}

# SubCharts configuration - defines Helm chart dependencies
# Note: These would need corresponding entries in Chart.yaml dependencies
subCharts:
  redis:
    enabled: true
    architecture: standalone
    auth:
      enabled: true
      password: "test-redis-password"
    master:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

  postgresql:
    enabled: true
    auth:
      username: testuser
      password: "test-postgres-password"
      database: testdb
    primary:
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

# Infrastructure configuration - should work without microservices
ciliumNetworkPolicies:
  enabled: true
  appPolicy:
    enabled: true

networkPolicies:
  enabled: false

generatedSecrets:
  enabled: true

defaults:
  domain: example.com
  virtualService:
    enabled: false
  imagePullSecrets:
    - name: private-registry
  service:
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true

# Note: microservices section is intentionally omitted to test infrastructure-only deployment
