---
# Example: Configuring multiple subCharts (Helm dependencies)
#
# This example demonstrates how to configure multiple dependency charts
# For v2.0.0: Uses standard Helm chart dependencies instead of ArgoCD Applications
#
# Prerequisites:
# 1. Add all dependencies to Chart.yaml (see example below)
# 2. Run: helm dependency update
# 3. Deploy: helm install myapp . -f this-file.yaml
#
# Example Chart.yaml dependencies:
# dependencies:
#   - name: redis
#     version: "17.9.5"
#     repository: "https://charts.bitnami.com/bitnami"
#     condition: subCharts.redis.enabled
#   - name: postgresql
#     version: "12.0.0"
#     repository: "https://charts.bitnami.com/bitnami"
#     condition: subCharts.postgresql.enabled
#   - name: rabbitmq
#     version: "11.0.0"
#     repository: "https://charts.bitnami.com/bitnami"
#     condition: subCharts.rabbitmq.enabled

global:
  applicationName: example-app
  customerName: example-customer
  impactLevel: il2
  environment: dev
  image:
    defaultImageRegistry: registry.example.com
    defaultImageRepository: example-customer

# Your application microservices
microservices:
  backend:
    image:
      repository: registry.example.com/example-customer/backend
      tag: "1.0.0"
    service:
      enabled: true
      port: 8080
    extraEnvs:
      # Connect to Redis
      - name: REDIS_HOST
        value: "example-app-redis-master"
      - name: REDIS_PORT
        value: "6379"
      # Connect to PostgreSQL
      - name: DB_HOST
        value: "example-app-postgresql"
      - name: DB_PORT
        value: "5432"
      - name: DB_NAME
        value: "appdb"
      # Connect to RabbitMQ
      - name: RABBITMQ_HOST
        value: "example-app-rabbitmq"
      - name: RABBITMQ_PORT
        value: "5672"

# Configure multiple subCharts (Helm dependencies)
subCharts:
  # Redis - for caching and session storage
  redis:
    enabled: true
    architecture: standalone
    auth:
      enabled: true
      password: "redis-password"
    master:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      persistence:
        enabled: true
        size: 8Gi

  # PostgreSQL - primary database
  postgresql:
    enabled: true
    auth:
      username: appuser
      password: "postgres-password"
      database: appdb
    primary:
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      persistence:
        enabled: true
        size: 20Gi

  # RabbitMQ - message queue
  rabbitmq:
    enabled: true
    auth:
      username: user
      password: "rabbitmq-password"
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      size: 8Gi

  # Example: Additional subchart that's disabled
  # mongodb:
  #   enabled: false
  #   auth:
  #     rootPassword: "mongo-password"
  #   resources:
  #     requests:
  #       cpu: 250m
  #       memory: 256Mi

# Optional: Enable infrastructure features
ciliumNetworkPolicies:
  enabled: false

networkPolicies:
  enabled: false

generatedSecrets:
  enabled: false
