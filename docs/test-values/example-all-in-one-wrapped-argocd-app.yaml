global:
  applicationName: example
  customerName: Example Company
  impactLevel: IL2
  environment: development
  gateway: istio-system/private
  domain: practice.gamewarden.io
  image:
    defaultImageRegistry: registry.gamewarden.io
    defaultImageRepository: testcustomer
  istio:
    mtls:
      enabled: false

ciliumNetworkPolicies:
  enabled: false

argocd:
  wrapAll: true
  disableProjectCreation: true

defaults:
  envFrom:
    - configMapRef:
        name: default-config

microservices:
  backend:
    match:
      - uri:
          prefix: /api
    image:
      tag: 0.0.0
    serviceAccount:
      create: enabled
    rbac:
      rules:
      - apiGroups: ["apps"]
        resources: ["deployments"]
        verbs: ["get", "list", "watch", "update"]
    autoscaling:
      #  -- Horizontal Autoscaling of pods
      enabled: true
      minReplicas: 1
      maxReplicas: 100
      targetCPUUtilizationPercentage: 80
      # targetMemoryUtilizationPercentage: 80
    ## - Support multiple configmaps like this
    config:
      airplane-data:
        .env: |
          logLevel: trace
          secretswithinconfigmap: sosecretshere
          service-url: http://localghost:9005
      car-json-data:
        test: testString
        test2: testString2
    envFrom:
    - secretRef:
        name: example
    - configMapRef:
        name: example
    annotations:
      argocd.argoproj.io/hook: PreSync
      argocd.argoproj.io/hook-delete-policy: HookSucceeded
  frontend:
    annotations:
      argocd.argoproj.io/hook: PreSync
      argocd.argoproj.io/hook-delete-policy: HookSucceeded
    statefulset:
      enabled: true
    prefix: /
    image:
      tag: 0.0.0
    service:
      enabled: false
    resources:
      limits:
        cpu: 400m
        memory: 3Gi
      requests:
        cpu: 400m
        memory: 3Gi
    envFrom:
    - secretRef:
        name: example
    - configMapRef:
        name: example
    restartPolicy: Always 

subCharts:
  clamav:
    serverSideApply: false
    enabled: true
    chartUrl: 'registry.spacex.com/example'
    chart: test
    revision: 0.0.2
    values:
      test: values
    valuesRepo: https://github.com/second-front/values.git
    valuesRevision: main
    valueFiles:
    - $clamav/test-dev/base.yaml
    - $clamav/test-dev/dev.yaml